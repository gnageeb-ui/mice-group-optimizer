<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mice Luminescence Group Optimizer</title>

<style>
:root { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas; }
body { margin: 24px; max-width: 1100px; }
h1 { font-size: 20px; margin-bottom: 16px; }
h2 { font-size: 16px; margin: 18px 0 10px; }
.grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; }
textarea { width: 100%; min-height: 260px; padding: 12px; border-radius: 10px; border: 1px solid #ccc; }
.card { border: 1px solid #ddd; border-radius: 12px; padding: 14px; background: white; }
label { display:block; font-size: 12px; margin: 10px 0 6px; }
input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; }
.row { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
button { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #999; background: #f2f2f2; cursor:pointer; }
button.primary { background: #e6f0ff; border-color:#2c6bed; }
pre { white-space: pre-wrap; background:#fafafa; border:1px solid #eee; padding: 12px; border-radius: 12px; }
.error { color: #b00020; }
.ok { color: #0a7a2f; }
.mono { font-variant-numeric: tabular-nums; }

.banner {
  display: none;
  margin-top: 12px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #cfe8cf;
  background: #f2fbf2;
  align-items: center;
  gap: 12px;
  grid-template-columns: 90px 1fr;
}

.banner.show { display: grid; }

.catPhoto{
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 14px;
  border: 1px solid #333;
}
</style>
</head>

<body>

<h1>Mice Luminescence Group Optimizer</h1>

<div class="grid">

<div class="card">
<label>Paste Data (mouse_id, value):</label>
<textarea id="data"></textarea>

<div id="catBanner" class="banner">
<img src="IMG_1638.jpg" alt="Sirius the cat" class="catPhoto" />
<div>
<b>Wow! You must have a really good take rate.</b><br>
My cat <b>Sirius</b> would like to congratulate you! 🐾
</div>
</div>

</div>

<div class="card">
<div class="row">
<div>
<label>Lower Fluorescence Limit</label>
<input id="lower" type="number" value="200000" />
</div>
<div>
<label>Upper Fluorescence Limit</label>
<input id="upper" type="number" value="7500000" />
</div>
</div>

<div class="row">
<div>
<label>Number of Groups</label>
<input id="k" type="number" value="6" />
</div>
<div>
<label>Mice per Group</label>
<input id="m" type="number" value="5" />
</div>
</div>

<label>Optimization Attempts</label>
<input id="attempts" type="number" value="4000" />

<div style="margin-top:12px;">
<button class="primary" onclick="run(false)">Optimize Groups</button>
<button onclick="run(true)">Rerun Optimization</button>
</div>

<div id="status"></div>
<div id="errors" class="error mono"></div>

</div>
</div>

<h2>Optimized Groups</h2>
<pre id="out" class="mono"></pre>

<script>

/* ---------- Parsing ---------- */

function parseInput(text) {
  const lines = text.split(/\r?\n/);
  const items = [];
  const invalid = [];

  let idx = 0;
  for (const line of lines) {
    idx++;
    if (!line.trim()) continue;

    let parts = line.split(",").map(x=>x.trim());
    if (parts.length < 2) parts = line.split("\t").map(x=>x.trim());

    if (parts.length < 2 || !parts[0]) {
      invalid.push(idx);
      continue;
    }

    const val = Number(parts[1].replace(/,/g,""));
    if (!Number.isFinite(val)) {
      invalid.push(idx);
      continue;
    }

    items.push({ mouse: parts[0], value: val });
  }

  return {items, invalid};
}

/* ---------- Optimization ---------- */

function score(groups){
  const sums = groups.map(g=>g.sum);
  const mean = sums.reduce((a,b)=>a+b,0)/sums.length;
  return Math.sqrt(sums.reduce((a,s)=>a+(s-mean)**2,0)/sums.length);
}

function assign(items,k,m){
  const groups = Array.from({length:k},(_,i)=>({id:i+1,items:[],sum:0}));
  const sorted = items.slice().sort((a,b)=>b.value-a.value);

  for(const it of sorted){
    const target = groups.filter(g=>g.items.length<m)
      .reduce((best,g)=>g.sum<best.sum?g:best);
    target.items.push(it);
    target.sum+=it.value;
  }
  return groups;
}

function optimize(items,k,m,attempts){
  let best=null,bestScore=Infinity;

  for(let i=0;i<attempts;i++){
    const shuffled = items.slice().sort(()=>Math.random()-0.5);
    const groups = assign(shuffled,k,m);
    const s = score(groups);
    if(s<bestScore){ bestScore=s; best=groups; }
  }
  return best;
}

/* ---------- Trim extras ---------- */

function trimExtras(items,k,m){
  const needed = k*m;
  if(items.length<=needed) return {kept:items,dropped:[]};

  const sorted = items.slice().sort((a,b)=>Math.abs(a.value)-Math.abs(b.value));
  const dropped = sorted.slice(0, items.length-needed);
  const kept = sorted.slice(items.length-needed);
  return {kept,dropped};
}

/* ---------- Render ---------- */

function render(groups){
  let out="";
  groups.forEach(g=>{
    const avg=g.sum/g.items.length;
    out+=`Group ${g.id} (Avg ${avg.toExponential(2)}):\n`;
    g.items.forEach(it=> out+=`  ${it.mouse}: ${it.value.toExponential(2)}\n`);
    out+="\n";
  });
  return out;
}

/* ---------- Main ---------- */

function run(rerun){
  const lower=Number(document.getElementById("lower").value);
  const upper=Number(document.getElementById("upper").value);
  const k=Number(document.getElementById("k").value);
  const m=Number(document.getElementById("m").value);
  const attempts=Number(document.getElementById("attempts").value);

  const {items,invalid}=parseInput(document.getElementById("data").value);

  document.getElementById("errors").innerText=
    invalid.length?`Invalid rows: ${invalid.join(", ")}`:"";

  // Celebration condition
  const banner=document.getElementById("catBanner");
  if(items.length>0 && items.every(x=>x.value>=lower)){
    banner.classList.add("show");
  } else {
    banner.classList.remove("show");
  }

  const usable=items.filter(x=>x.value>=lower && x.value<=upper);
  const needed=k*m;

  if(usable.length<needed){
    document.getElementById("status").innerHTML=
      `<span class="error">Need ${needed} usable mice. You have ${usable.length}.</span>`;
    return;
  }

  const {kept,dropped}=trimExtras(usable,k,m);

  const groups=optimize(kept,k,m,attempts);

  let output="";
  if(dropped.length){
    output+="Dropped as outliers:\n";
    dropped.forEach(d=>output+=`  ${d.mouse}: ${d.value.toExponential(2)}\n`);
    output+="\n";
  }

  output+=render(groups);
  document.getElementById("out").innerText=output;
  document.getElementById("status").innerHTML="<span class='ok'>Done.</span>";
}

</script>

</body>
</html>
