<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mice Luminescence Group Optimizer</title>

<style>
  :root { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas; }
  body { margin: 24px; max-width: 1100px; }
  h1 { font-size: 20px; margin-bottom: 16px; }
  h2 { font-size: 16px; margin: 18px 0 10px; }
  .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; }
  textarea { width: 100%; min-height: 260px; padding: 12px; border-radius: 10px; border: 1px solid #ccc; }
  .card { border: 1px solid #ddd; border-radius: 12px; padding: 14px; background: white; }
  label { display:block; font-size: 12px; margin: 10px 0 6px; }
  input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; }
  .row { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #999; background: #f2f2f2; cursor:pointer; }
  button.primary { background: #e6f0ff; border-color:#2c6bed; }
  pre { white-space: pre-wrap; background:#fafafa; border:1px solid #eee; padding: 12px; border-radius: 12px; }
  .error { color: #b00020; }
  .ok { color: #0a7a2f; }
  .mono { font-variant-numeric: tabular-nums; }

  /* Big Sirius banner */
  .banner {
    display: none;
    margin-top: 14px;
    padding: 16px;
    border-radius: 16px;
    border: 1px solid #bfe7bf;
    background: linear-gradient(180deg, #f2fbf2, #ffffff);
    align-items: center;
    gap: 16px;
    grid-template-columns: 170px 1fr;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
  }

  .banner.show {
    display: grid;
    animation: slideIn 520ms cubic-bezier(.2,.9,.25,1) both;
  }

  .catPhoto{
    width: 170px;
    height: 170px;
    object-fit: cover;
    border-radius: 18px;
    border: 2px solid #222;
    box-shadow: 0 10px 24px rgba(0,0,0,0.15);
    animation: pop 700ms cubic-bezier(.15,1.2,.25,1) both;
  }

  .bannerTitle {
    font-size: 16px;
    font-weight: 800;
    margin: 0 0 6px;
    letter-spacing: 0.2px;
  }
  .bannerText {
    margin: 0;
    font-size: 13px;
    color: #234;
    line-height: 1.35;
  }
  .sparkleRow {
    margin-top: 10px;
    font-size: 18px;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.12));
    animation: shimmer 1200ms ease-in-out infinite;
  }

  /* Confetti canvas overlay */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
  }

  @keyframes slideIn {
    from { transform: translateY(10px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes pop {
    0%   { transform: scale(0.92); }
    60%  { transform: scale(1.04); }
    100% { transform: scale(1.0); }
  }
  @keyframes shimmer {
    0%, 100% { transform: translateY(0); opacity: 0.95; }
    50% { transform: translateY(-2px); opacity: 1; }
  }
</style>
</head>

<body>
<canvas id="confetti"></canvas>

<h1>Mice Luminescence Group Optimizer</h1>

<div class="grid">
  <div class="card">
    <label>Paste Data (mouse_id, value):</label>
    <textarea id="data" placeholder="050, 1.2e6&#10;948, 7.1e6"></textarea>

    <div id="catBanner" class="banner">
      <img src="IMG_1638.jpg" alt="Sirius the cat" class="catPhoto" />
      <div>
        <div class="bannerTitle">Wow! You must have a really good take rate.</div>
        <p class="bannerText">My cat <b>Sirius</b> would like to congratulate you! 🐾</p>
        <div class="sparkleRow">✨🎉✨🎊✨</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label>Lower Fluorescence Limit</label>
        <input id="lower" type="number" value="200000" />
      </div>
      <div>
        <label>Upper Fluorescence Limit</label>
        <input id="upper" type="number" value="7500000" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Number of Groups</label>
        <input id="k" type="number" value="6" />
      </div>
      <div>
        <label>Mice per Group</label>
        <input id="m" type="number" value="5" />
      </div>
    </div>

    <label>Optimization Attempts</label>
    <input id="attempts" type="number" value="4000" />

    <div style="margin-top:12px; display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <button class="primary" onclick="run(false)">Optimize Groups</button>
      <button onclick="run(true)">Rerun Optimization</button>
    </div>

    <div id="status" class="mono" style="margin-top:10px;"></div>
    <div id="errors" class="mono" style="margin-top:10px;"></div>
  </div>
</div>

<h2>Optimized Groups</h2>
<pre id="out" class="mono"></pre>

<script>
/* ---------- Parsing ---------- */
function parseInput(text) {
  const lines = text.split(/\r?\n/);
  const items = [];
  const invalid = [];

  let idx = 0;
  for (const line of lines) {
    idx++;
    const t = line.trim();
    if (!t) continue;

    // comma first, then tab
    let parts = t.split(",").map(x => x.trim());
    if (parts.length < 2) parts = t.split("\t").map(x => x.trim());

    if (parts.length < 2 || !parts[0]) { invalid.push(idx); continue; }

    // allow 1.2e6 etc; strip commas
    const val = Number(String(parts[1]).replace(/,/g, ""));
    if (!Number.isFinite(val)) { invalid.push(idx); continue; }

    items.push({ mouse: parts[0], value: val });
  }
  return { items, invalid };
}

/* ---------- Optimization (balanced sums) ---------- */
function score(groups){
  const sums = groups.map(g => g.sum);
  const mean = sums.reduce((a,b)=>a+b,0)/sums.length;
  return Math.sqrt(sums.reduce((a,s)=>a+(s-mean)**2,0)/sums.length);
}

function assign(items,k,m){
  const groups = Array.from({length:k},(_,i)=>({id:i+1,items:[],sum:0}));
  const sorted = items.slice().sort((a,b)=>b.value-a.value);

  for(const it of sorted){
    const candidates = groups.filter(g => g.items.length < m);
    const target = candidates.reduce((best,g)=>g.sum < best.sum ? g : best, candidates[0]);
    target.items.push(it);
    target.sum += it.value;
  }
  return groups;
}

function optimize(items,k,m,attempts){
  let best=null,bestScore=Infinity;

  // baseline
  {
    const g = assign(items, k, m);
    const s = score(g);
    best=g; bestScore=s;
  }

  for(let i=0;i<attempts;i++){
    const shuffled = items.slice().sort(()=>Math.random()-0.5);
    const groups = assign(shuffled,k,m);
    const s = score(groups);
    if(s < bestScore){ bestScore=s; best=groups; }
  }
  return { best, bestScore };
}

/* ---------- Trimming extras (choose removals that help balance) ---------- */
function sample(arr, n){
  const a = arr.slice().sort(()=>Math.random()-0.5);
  return a.slice(0, n);
}

function trimToNeeded(usable, k, m, attempts){
  const needed = k*m;
  if(usable.length <= needed) return { kept: usable, dropped: [] };

  let pool = usable.slice();
  const dropped = [];
  const trimAttempts = Math.max(300, Math.floor(attempts/6));

  while(pool.length > needed){
    // only consider extreme candidates to keep it fast
    const sorted = pool.slice().sort((a,b)=>a.value-b.value);
    const take = Math.min(20, Math.floor(sorted.length/2));
    const candidates = [];
    for(let i=0;i<take;i++) candidates.push(sorted[i]);
    for(let i=0;i<take;i++) candidates.push(sorted[sorted.length-1-i]);

    let bestCand = candidates[0];
    let bestScore = Infinity;

    for(const cand of candidates){
      const candidatePool = pool.filter(x => x !== cand);
      const evalSet = candidatePool.length === needed ? candidatePool : sample(candidatePool, needed);
      const res = optimize(evalSet, k, m, trimAttempts);
      if(res.bestScore < bestScore){
        bestScore = res.bestScore;
        bestCand = cand;
      }
    }

    pool = pool.filter(x => x !== bestCand);
    dropped.push(bestCand);
  }

  return { kept: pool, dropped };
}

/* ---------- Render ---------- */
function fmt(x){
  const abs = Math.abs(x);
  if(abs >= 1e6 || abs < 1e-2) return x.toExponential(2).replace("e+","e");
  return Math.round(x).toLocaleString();
}

function render(groups){
  const sums = groups.map(g=>g.sum);
  const mean = sums.reduce((a,b)=>a+b,0)/sums.length;
  const min = Math.min(...sums);
  const max = Math.max(...sums);

  let out = `Summary: mean sum = ${fmt(mean)} | min sum = ${fmt(min)} | max sum = ${fmt(max)} | spread = ${fmt(max-min)}\n\n`;

  groups.forEach(g=>{
    const avg = g.sum / g.items.length;
    out += `Group ${g.id} (Avg ${fmt(avg)} | Sum ${fmt(g.sum)}):\n`;
    g.items.slice().sort((a,b)=>b.value-a.value).forEach(it=>{
      out += `  ${it.mouse}: ${fmt(it.value)}\n`;
    });
    out += "\n";
  });
  return out;
}

/* ---------- Confetti (simple particle burst) ---------- */
const confettiCanvas = document.getElementById("confetti");
const ctx = confettiCanvas.getContext("2d");
let confetti = [];
let confettiRAF = null;

function resizeConfetti(){
  confettiCanvas.width = window.innerWidth * devicePixelRatio;
  confettiCanvas.height = window.innerHeight * devicePixelRatio;
  confettiCanvas.style.width = window.innerWidth + "px";
  confettiCanvas.style.height = window.innerHeight + "px";
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
window.addEventListener("resize", resizeConfetti);
resizeConfetti();

function burstConfetti(){
  const originX = window.innerWidth * 0.35;
  const originY = 120;

  const n = 180;
  const colors = ["#ff4d4d","#ffb84d","#ffe84d","#4dff88","#4dd2ff","#8a5cff","#ff4dd2"];

  for(let i=0;i<n;i++){
    confetti.push({
      x: originX + (Math.random()*80 - 40),
      y: originY + (Math.random()*30 - 15),
      vx: (Math.random()*10 - 5),
      vy: -(Math.random()*10 + 6),
      g: 0.35 + Math.random()*0.18,
      s: 4 + Math.random()*6,
      r: Math.random()*Math.PI,
      vr: (Math.random()*0.25 - 0.125),
      life: 0,
      ttl: 160 + Math.random()*60,
      color: colors[Math.floor(Math.random()*colors.length)]
    });
  }

  if(!confettiRAF) animateConfetti();
}

function animateConfetti(){
  confettiRAF = requestAnimationFrame(animateConfetti);
  ctx.clearRect(0,0,window.innerWidth, window.innerHeight);

  confetti = confetti.filter(p => p.life < p.ttl);

  for(const p of confetti){
    p.life += 1;
    p.vy += p.g;
    p.x += p.vx;
    p.y += p.vy;
    p.r += p.vr;

    const alpha = Math.max(0, 1 - (p.life / p.ttl));
    ctx.globalAlpha = alpha;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.r);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.s/2, -p.s/2, p.s, p.s*0.7);
    ctx.restore();
  }

  ctx.globalAlpha = 1;

  if(confetti.length === 0){
    cancelAnimationFrame(confettiRAF);
    confettiRAF = null;
    ctx.clearRect(0,0,window.innerWidth, window.innerHeight);
  }
}

/* ---------- Main ---------- */
let lastEliteState = false;

function run(isRerun){
  const lower = Number(document.getElementById("lower").value);
  const upper = Number(document.getElementById("upper").value);
  const k = Number(document.getElementById("k").value);
  const m = Number(document.getElementById("m").value);
  const attemptsBase = Number(document.getElementById("attempts").value);
  const attempts = isRerun ? Math.max(attemptsBase * 3, 10000) : attemptsBase;

  const statusEl = document.getElementById("status");
  const errEl = document.getElementById("errors");
  const outEl = document.getElementById("out");

  errEl.textContent = "";
  outEl.textContent = "";
  statusEl.textContent = "Working…";

  const { items, invalid } = parseInput(document.getElementById("data").value);

  // elite condition: all parsed mice are >= lower
  const elite = items.length > 0 && items.every(x => x.value >= lower);

  const banner = document.getElementById("catBanner");
  banner.classList.toggle("show", elite);

  if(elite && !lastEliteState) burstConfetti();
  lastEliteState = elite;

  // NEW: count below/above limits
  const belowLower = items.filter(x => x.value < lower);
  const aboveUpper = items.filter(x => x.value > upper);
  const usable = items.filter(x => x.value >= lower && x.value <= upper);

  // Show counts + invalid rows
  let summary = `Parsed: ${items.length}\n`;
  summary += `Usable (${lower}–${upper}): ${usable.length}\n`;
  summary += `Below lower limit: ${belowLower.length}\n`;
  summary += `Above upper limit: ${aboveUpper.length}`;
  if(invalid.length) summary += `\nInvalid rows: ${invalid.join(", ")}`;

  errEl.textContent = summary;

  const needed = k * m;
  if(usable.length < needed){
    statusEl.innerHTML = `<span class="error">Need at least ${needed} usable mice for ${k} groups of ${m}. You have ${usable.length} usable.</span>`;
    return;
  }

  const trimmed = trimToNeeded(usable, k, m, attempts);
  const kept = trimmed.kept;
  const dropped = trimmed.dropped;

  const res = optimize(kept, k, m, attempts);

  let output = "";
  if(dropped.length){
    output += `Dropped ${dropped.length} outlier-like mice to fit ${k}×${m}:\n`;
    dropped.slice().sort((a,b)=>b.value-a.value).forEach(d=>{
      output += `  ${d.mouse}: ${fmt(d.value)}\n`;
    });
    output += "\n";
  }

  output += render(res.best);
  outEl.textContent = output;

  statusEl.innerHTML = `<span class="ok">Done.</span> StdDev(group sums) = ${fmt(res.bestScore)} | used ${kept.length}/${usable.length} usable`;
}
</script>

</body>
</html>
